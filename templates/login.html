<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Lista de Compras</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        :root {
            --bg-color: #f5f5f5;
            --text-color: #333;
            --card-bg: white;
            --border-color: #ddd;
            --input-bg: white;
            --shadow: rgba(0,0,0,0.1);
            --btn-primary: #007bff;
            --btn-primary-hover: #0056b3;
            --error-bg: #f8d7da;
            --error-color: #721c24;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e0e0e0;
                --card-bg: #2d2d2d;
                --border-color: #404040;
                --input-bg: #3d3d3d;
                --shadow: rgba(0,0,0,0.3);
                --btn-primary: #0056b3;
                --btn-primary-hover: #003d80;
                --error-bg: #521b24;
                --error-color: #f8d7da;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.2em;
            color: var(--vacio-color, #666);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-color);
        }

        input:focus {
            outline: none;
            border-color: var(--btn-primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--btn-primary-hover);
        }

        .error {
            background: var(--error-bg);
            color: var(--error-color);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--border-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🛒 Lista de Compras</h1>
        <h2>Acceso Familiar</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Usuario:</label>
                <input type="text" name="username" placeholder="Tu usuario" required autofocus>
            </div>
            
            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit">Entrar</button>
        </form>
        
        <div class="info">
            <p>Solo para uso familiar</p>
        </div>
    </div>
</body>
</html>
